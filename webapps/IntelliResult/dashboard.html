<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntelliResult — Dashboard</title>
<style>
:root[data-theme="dark"]{--bg:#020818;--card:rgba(10,20,45,0.88);--card2:rgba(15,28,55,0.7);--border:rgba(99,102,241,0.2);--border2:rgba(99,102,241,0.5);--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--glow1:rgba(99,102,241,0.3);--glow2:rgba(139,92,246,0.2);--glow3:rgba(56,189,248,0.15);--acc:#6366f1;--acc2:#8b5cf6;--acc3:#38bdf8;--nav:rgba(5,12,30,0.96);--tag-bg:rgba(99,102,241,0.15);--tag-text:#a78bfa;--tip-bg:rgba(99,102,241,0.06)}
:root[data-theme="light"]{--bg:#eef2ff;--card:rgba(255,255,255,0.93);--card2:rgba(240,244,255,0.8);--border:rgba(99,102,241,0.18);--border2:rgba(99,102,241,0.5);--text:#1e1b4b;--text2:#4338ca;--text3:#6b7280;--glow1:rgba(99,102,241,0.18);--glow2:rgba(139,92,246,0.12);--glow3:rgba(56,189,248,0.1);--acc:#4f46e5;--acc2:#7c3aed;--acc3:#0284c7;--nav:rgba(238,242,255,0.97);--tag-bg:rgba(99,102,241,0.1);--tag-text:#4338ca;--tip-bg:rgba(99,102,241,0.04)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);transition:background 0.4s,color 0.4s}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:pulse 5s ease-in-out infinite alternate}
.orb1{width:520px;height:520px;top:-160px;left:-160px;background:radial-gradient(circle,var(--glow1),transparent 70%)}
.orb2{width:420px;height:420px;bottom:-110px;right:-110px;background:radial-gradient(circle,var(--glow2),transparent 70%);animation-delay:2.5s}
.orb3{width:320px;height:320px;top:38%;left:54%;background:radial-gradient(circle,var(--glow3),transparent 70%);animation-delay:1.2s}
@keyframes pulse{0%{opacity:0.4;transform:scale(1)}100%{opacity:0.9;transform:scale(1.12)}}
nav{position:sticky;top:0;z-index:50;background:var(--nav);border-bottom:1px solid var(--border);backdrop-filter:blur(22px);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--glow1)}
.logo-icon svg{width:17px;height:17px}
.logo-name{font-size:18px;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(135deg,var(--acc),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-right{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;box-shadow:0 0 15px var(--glow1)}
.nav-name{color:var(--text2);font-size:13px;font-weight:600}
.btn-sm{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.btn-sm:hover{border-color:var(--border2);color:var(--acc);box-shadow:0 0 15px var(--glow1)}
.btn-danger{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.07);color:#fca5a5}
[data-theme="light"] .btn-danger{color:#b91c1c}
.btn-danger:hover{border-color:rgba(239,68,68,0.5)!important;color:#ef4444!important;box-shadow:0 0 15px rgba(239,68,68,0.2)!important}
.main{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:30px 20px}
.hero{margin-bottom:28px}
.tag{display:inline-block;padding:4px 14px;border-radius:999px;background:var(--tag-bg);border:1px solid var(--border);color:var(--tag-text);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
h1{font-size:clamp(1.8rem,4vw,2.5rem);font-weight:900;letter-spacing:-0.04em;color:var(--text);line-height:1.15;margin-bottom:6px}
.hero-sub{color:var(--text3);font-size:14px}

/* Stats grid */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:14px;margin-bottom:26px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px 16px;backdrop-filter:blur(14px);transition:transform 0.25s,box-shadow 0.25s,border-color 0.25s;cursor:default;position:relative;overflow:hidden}
.stat-card::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.03),transparent);pointer-events:none}
.stat-card:hover{transform:translateY(-5px);border-color:var(--border2);box-shadow:0 0 45px var(--glow1)}
.stat-icon{font-size:26px;margin-bottom:10px}
.stat-val{font-size:clamp(1.5rem,3vw,2.1rem);font-weight:900;letter-spacing:-0.03em;margin-bottom:3px}
.stat-val.c-green{color:#10b981}.stat-val.c-amber{color:#f59e0b}.stat-val.c-blue{color:#38bdf8}.stat-val.c-purple{color:#a78bfa}.stat-val.c-acc{color:var(--acc)}
.stat-label{color:var(--text3);font-size:12px;font-weight:600}

/* Metrics radar section */
.section{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:26px;backdrop-filter:blur(14px);margin-bottom:22px}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:8px}
.sec-title{font-size:15px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
.sec-title .ic{color:var(--acc)}
.sec-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:7px;background:var(--tag-bg);border:1px solid var(--border);color:var(--tag-text)}

/* Metric bars */
.metrics{display:flex;flex-direction:column;gap:20px}
.metric-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.metric-name{font-size:13px;font-weight:700;color:var(--text)}
.metric-right{display:flex;align-items:center;gap:10px}
.metric-val{font-size:14px;font-weight:800}
.metric-rank{font-size:11px;color:var(--text3)}
.track{height:8px;border-radius:999px;background:rgba(148,163,184,0.1);overflow:hidden;position:relative}
.fill{height:100%;border-radius:999px;position:relative;transition:width 1.4s cubic-bezier(0.4,0,0.2,1)}
.fill::after{content:"";position:absolute;right:0;top:0;bottom:0;width:3px;border-radius:999px;background:rgba(255,255,255,0.6);filter:blur(1px)}

/* Tip cards */
.tips{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:22px}
.tip-card{background:var(--tip-bg);border:1px solid var(--border);border-radius:16px;padding:18px;display:flex;gap:14px;align-items:flex-start}
.tip-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.tip-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.tip-body{font-size:12px;color:var(--text3);line-height:1.6}

/* Bottom */
.bottom-row{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;flex-wrap:wrap}
.result-btn{padding:16px 32px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:white;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.25s;box-shadow:0 0 35px var(--glow1),0 10px 28px rgba(99,102,241,0.4);white-space:nowrap;position:relative;overflow:hidden}
.result-btn::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,0.1),transparent);transform:translateX(-100%);transition:transform 0.5s}
.result-btn:hover::after{transform:translateX(100%)}
.result-btn:hover{transform:translateY(-3px);box-shadow:0 0 55px var(--glow1),0 14px 40px rgba(99,102,241,0.5)}
.badge-box{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.22);border-radius:16px;padding:16px 20px}
.badge-box p:first-child{font-size:11px;color:#34d399;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
.badge-box p:last-child{font-size:14px;font-weight:700;color:var(--text)}
.badge-box p:last-child em{color:#10b981;font-style:normal}

/* Classrank */
.rank-section{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.rank-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;backdrop-filter:blur(12px)}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.main>*{animation:fadeUp 0.5s ease both}
.stats{animation-delay:.05s}.section{animation-delay:.12s}.tips{animation-delay:.18s}.rank-section{animation-delay:.22s}.bottom-row{animation-delay:.28s}
@media(max-width:600px){.nav-name{display:none}.bottom-row{grid-template-columns:1fr}.result-btn{width:100%}.rank-section{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<nav>
  <div class="logo-row">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <span class="logo-name">IntelliResult</span>
  </div>
  <div class="nav-right">
    <button class="btn-sm" id="themeBtn">🌙</button>
    <div class="avatar" id="navAvatar">--</div>
    <span class="nav-name" id="navName">Loading…</span>
    <button class="btn-sm btn-danger" id="logoutBtn">Sign Out</button>
  </div>
</nav>
<div class="main">
  <div class="hero">
    <div class="tag" id="semTag">Semester · Branch</div>
    <h1 id="greeting">Hello 👋</h1>
    <p class="hero-sub" id="rollInfo">Loading student data…</p>
  </div>
  <div class="stats" id="statsGrid"></div>
  <div class="section">
    <div class="sec-header">
      <div class="sec-title"><span class="ic">📊</span> Performance Metrics</div>
      <div class="sec-badge" id="overallGradeBadge">Grade –</div>
    </div>
    <div class="metrics" id="metricsContainer"></div>
  </div>
  <div class="tips" id="tipsGrid"></div>
  <div class="rank-section" id="rankSection"></div>
  <div class="bottom-row">
    <div class="badge-box">
      <p>📄 CSV Dataset</p>
      <p id="datasetLine">student_performance.csv — <em>loaded</em></p>
    </div>
    <button class="result-btn" id="resultsBtn">View Full Analysis →</button>
  </div>
</div>
<script src="data.js"></script>
<script>
// ── Theme ─────────────────────────────────────────────────────────────────────
const savedTheme = localStorage.getItem("ir-theme") || sessionStorage.getItem("ir-theme") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
const themeBtn = document.getElementById("themeBtn");
themeBtn.textContent = savedTheme === "dark" ? "🌙" : "☀️";
themeBtn.onclick = () => {
  const t = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("ir-theme", t);
  themeBtn.textContent = t === "dark" ? "🌙" : "☀️";
};

// ── Auth ──────────────────────────────────────────────────────────────────────
const username = sessionStorage.getItem("ir-user");
if (!username) { window.location.href = "login.html"; }
const d = getStudentData(username);
if (!d) { window.location.href = "login.html"; }

document.getElementById("logoutBtn").onclick = () => { sessionStorage.clear(); window.location.href = "login.html"; };
document.getElementById("resultsBtn").onclick = () => { window.location.href = "result.html"; };

// ── Populate header ───────────────────────────────────────────────────────────
document.getElementById("navAvatar").textContent = d.avatar.toString().substring(0,2);
document.getElementById("navName").textContent = d.name;
document.getElementById("semTag").textContent = `${d.semester} · ${d.branch}`;
document.getElementById("greeting").textContent = `Hello, ${d.name.split(" ")[0]} 👋`;
document.getElementById("rollInfo").textContent = `Roll No: ${d.rollNo}  ·  Student ID: #${d.student_id}  ·  Your analytics dashboard is ready`;
document.getElementById("datasetLine").innerHTML = `student_performance.csv — record <em>#${d.student_id}</em>`;

// ── Grade colour from total_score ─────────────────────────────────────────────
const g = d.grade;
const gColor = gradeColor(g);
const gLabel = gradeLabel(g);

// ── Stats grid ────────────────────────────────────────────────────────────────
const rankAmong = CSV_DATA.filter(r => r.total_score >= d.total_score).length;
const rankPct   = Math.round((1 - (rankAmong-1)/CSV_DATA.length) * 100);

const stats = [
  { icon:"🎯", val: d.total_score.toFixed(1), cls:"c-acc",   label:"Total Score" },
  { icon:"📖", val: d.weekly_self_study_hours.toFixed(1)+"h", cls:"c-purple", label:"Study hrs/week" },
  { icon:"🏫", val: d.attendance_percentage.toFixed(1)+"%",   cls:"c-green",  label:"Attendance" },
  { icon:"🙋", val: d.class_participation.toFixed(1)+"/10",   cls:"c-blue",   label:"Participation" },
  { icon:"🏅", val: g,                                          cls:"c-amber",  label:"Grade",   style:`color:${gColor}` },
  { icon:"📊", val: "Top "+rankPct+"%",                        cls:"c-green",  label:"Class Rank" },
];

document.getElementById("statsGrid").innerHTML = stats.map(s =>
  `<div class="stat-card">
    <div class="stat-icon">${s.icon}</div>
    <div class="stat-val ${s.cls}" ${s.style?`style="${s.style}"`:""}>${s.val}</div>
    <div class="stat-label">${s.label}</div>
  </div>`
).join("");

// ── Metrics bars ──────────────────────────────────────────────────────────────
document.getElementById("overallGradeBadge").textContent = `Grade ${g} — ${gLabel}`;
document.getElementById("overallGradeBadge").style.cssText = `background:${gColor}18;color:${gColor};border-color:${gColor}30`;

const classAvgScore = (CSV_DATA.reduce((s,r)=>s+r.total_score,0)/CSV_DATA.length).toFixed(1);
const classAvgStudy = (CSV_DATA.reduce((s,r)=>s+r.weekly_self_study_hours,0)/CSV_DATA.length).toFixed(1);
const classAvgAtt   = (CSV_DATA.reduce((s,r)=>s+r.attendance_percentage,0)/CSV_DATA.length).toFixed(1);
const classAvgPart  = (CSV_DATA.reduce((s,r)=>s+r.class_participation,0)/CSV_DATA.length).toFixed(1);

const metrics = [
  { name:"Total Score", val:d.total_score, max:100,  classAvg:parseFloat(classAvgScore), unit:"%", color:"#6366f1" },
  { name:"Attendance",  val:d.attendance_percentage, max:100, classAvg:parseFloat(classAvgAtt), unit:"%", color:"#10b981" },
  { name:"Study Hours/week", val:d.weekly_self_study_hours, max:30, classAvg:parseFloat(classAvgStudy), unit:"h", color:"#8b5cf6" },
  { name:"Class Participation", val:d.class_participation, max:10, classAvg:parseFloat(classAvgPart), unit:"/10", color:"#38bdf8" },
];

document.getElementById("metricsContainer").innerHTML = metrics.map(m => {
  const pct = Math.round((m.val/m.max)*100);
  const avgPct = Math.round((m.classAvg/m.max)*100);
  const diff = (m.val - m.classAvg).toFixed(1);
  const diffSign = diff >= 0 ? "+" : "";
  return `<div class="metric-row">
    <div class="metric-top">
      <span class="metric-name">${m.name}</span>
      <span class="metric-right">
        <span class="metric-rank" style="font-size:11px;color:${diff>=0?"#10b981":"#f59e0b"}">${diffSign}${diff} vs class avg</span>
        <span class="metric-val" style="color:${m.color}">${m.val.toFixed(1)}${m.unit}</span>
      </span>
    </div>
    <div class="track">
      <div class="fill" style="width:0%;background:linear-gradient(90deg,${m.color}88,${m.color})" data-w="${pct}"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:5px">
      <span style="font-size:10px;color:var(--text3)">0</span>
      <span style="font-size:10px;color:var(--text3)">Class avg: ${m.classAvg}${m.unit} (${avgPct}%)</span>
      <span style="font-size:10px;color:var(--text3)">${m.max}${m.unit}</span>
    </div>
  </div>`;
}).join("");

setTimeout(() => {
  document.querySelectorAll(".fill").forEach(el => { el.style.width = el.dataset.w + "%"; });
}, 120);

// ── AI Tips ───────────────────────────────────────────────────────────────────
function generateTips(data) {
  const tips = [];
  if (data.attendance_percentage < 75) {
    tips.push({ icon:"⚠️", title:"Attendance Alert", body:`Your attendance is ${data.attendance_percentage.toFixed(1)}%, which is below the recommended 75%. Regular attendance directly correlates with better scores.` });
  } else {
    tips.push({ icon:"✅", title:"Great Attendance!", body:`${data.attendance_percentage.toFixed(1)}% attendance — excellent consistency. Studies show attendance above 80% boosts exam performance significantly.` });
  }
  if (data.weekly_self_study_hours < 10) {
    tips.push({ icon:"📚", title:"Study Hours Low", body:`You study ${data.weekly_self_study_hours.toFixed(1)} hrs/week. The class average is ${classAvgStudy}h. Try increasing dedicated study time to improve your score.` });
  } else if (data.weekly_self_study_hours >= 20) {
    tips.push({ icon:"🔥", title:"Top Studier!", body:`${data.weekly_self_study_hours.toFixed(1)} hrs/week — you're in the top study tier. Make sure to balance with proper rest for optimal retention.` });
  } else {
    tips.push({ icon:"📖", title:"Solid Study Habit", body:`${data.weekly_self_study_hours.toFixed(1)} hrs/week is a healthy pace. Adding just 2-3 more hours during exam weeks can push your grade up.` });
  }
  if (data.class_participation < 5) {
    tips.push({ icon:"🙋", title:"Engage More in Class", body:`Participation score: ${data.class_participation.toFixed(1)}/10. Active classroom engagement helps consolidate learning and improves retention by 40%.` });
  } else {
    tips.push({ icon:"🌟", title:"Active Participant", body:`Participation: ${data.class_participation.toFixed(1)}/10 — you're engaged and collaborative. This habit significantly benefits long-term academic growth.` });
  }
  if (data.total_score >= 90) {
    tips.push({ icon:"🏆", title:"Outstanding Performance", body:`Score: ${data.total_score.toFixed(1)} — you're in the top grade band! Consider mentoring peers or taking advanced coursework.` });
  } else if (data.total_score < 55) {
    tips.push({ icon:"💡", title:"Room to Grow", body:`Score: ${data.total_score.toFixed(1)} — with focused effort on attendance and study hours, significant improvement is achievable. Set small weekly goals.` });
  }
  return tips.slice(0, 4);
}

const tips = generateTips(d);
document.getElementById("tipsGrid").innerHTML = tips.map(t =>
  `<div class="tip-card"><div class="tip-icon">${t.icon}</div><div><div class="tip-title">${t.title}</div><div class="tip-body">${t.body}</div></div></div>`
).join("");

// ── Rank comparison ───────────────────────────────────────────────────────────
const betterThan = CSV_DATA.filter(r => r.total_score < d.total_score).length;
const betterPct  = Math.round((betterThan/CSV_DATA.length)*100);
const gradeCount = CSV_DATA.filter(r=>r.grade===g).length;

document.getElementById("rankSection").innerHTML = `
  <div class="rank-card">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--text3);margin-bottom:10px">Class Standing</div>
    <div style="font-size:2.2rem;font-weight:900;color:${gColor};margin-bottom:4px">#${CSV_DATA.length - betterThan} / ${CSV_DATA.length}</div>
    <div style="font-size:13px;color:var(--text2)">in dataset sample</div>
    <div style="margin-top:12px;font-size:12px;color:var(--text3)">Better than <strong style="color:var(--acc)">${betterPct}%</strong> of students</div>
  </div>
  <div class="rank-card">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--text3);margin-bottom:10px">Grade Distribution</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      ${["A","B","C","D","F"].map(gr=>{
        const cnt = CSV_DATA.filter(r=>r.grade===gr).length;
        const pct = Math.round((cnt/CSV_DATA.length)*100);
        const c = gradeColor(gr);
        const isMe = gr===g;
        return `<span style="padding:5px 10px;border-radius:8px;font-size:12px;font-weight:800;background:${c}${isMe?"33":"15"};color:${c};border:1px solid ${c}${isMe?"55":"28"};${isMe?"box-shadow:0 0 12px "+c+"44":""}">${gr} ${pct}%</span>`;
      }).join("")}
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--text3)"><strong style="color:${gColor}">${gradeCount}</strong> students share your Grade ${g}</div>
  </div>
`;
</script>
</body>
</html>
