<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntelliResult — Login</title>
<style>
:root[data-theme="dark"] {
  --bg: #020818;
  --bg2: #0a1628;
  --card: rgba(10,20,45,0.92);
  --border: rgba(99,102,241,0.22);
  --border2: rgba(99,102,241,0.5);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #475569;
  --input-bg: rgba(255,255,255,0.04);
  --input-focus: rgba(99,102,241,0.1);
  --glow1: rgba(99,102,241,0.35);
  --glow2: rgba(139,92,246,0.25);
  --glow3: rgba(56,189,248,0.18);
  --acc: #6366f1;
  --acc2: #8b5cf6;
  --acc3: #38bdf8;
  --err-bg: rgba(239,68,68,0.12);
  --err-border: rgba(239,68,68,0.3);
  --err-text: #fca5a5;
  --hint-bg: rgba(99,102,241,0.08);
  --hint-border: rgba(99,102,241,0.2);
}
:root[data-theme="light"] {
  --bg: #f0f4ff;
  --bg2: #e8eeff;
  --card: rgba(255,255,255,0.95);
  --border: rgba(99,102,241,0.2);
  --border2: rgba(99,102,241,0.6);
  --text: #1e1b4b;
  --text2: #4338ca;
  --text3: #818cf8;
  --input-bg: rgba(99,102,241,0.05);
  --input-focus: rgba(99,102,241,0.08);
  --glow1: rgba(99,102,241,0.2);
  --glow2: rgba(139,92,246,0.15);
  --glow3: rgba(56,189,248,0.12);
  --acc: #4f46e5;
  --acc2: #7c3aed;
  --acc3: #0284c7;
  --err-bg: rgba(239,68,68,0.08);
  --err-border: rgba(239,68,68,0.35);
  --err-text: #b91c1c;
  --hint-bg: rgba(99,102,241,0.06);
  --hint-border: rgba(99,102,241,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow-x:hidden;transition:background 0.4s,color 0.4s}
.orb{position:absolute;border-radius:50%;pointer-events:none;animation:pulse 4s ease-in-out infinite alternate}
.orb1{width:400px;height:400px;top:-100px;left:-100px;background:radial-gradient(circle,var(--glow1),transparent 70%)}
.orb2{width:350px;height:350px;bottom:-80px;right:-80px;background:radial-gradient(circle,var(--glow2),transparent 70%);animation-delay:2s}
.orb3{width:250px;height:250px;top:50%;left:60%;background:radial-gradient(circle,var(--glow3),transparent 70%);animation-delay:1s}
@keyframes pulse{0%{opacity:0.5;transform:scale(1)}100%{opacity:1;transform:scale(1.1)}}
.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{position:absolute;background:#818cf8;border-radius:50%;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.8}}
.theme-btn{position:absolute;top:20px;right:20px;z-index:100;background:var(--card);border:1px solid var(--border);color:var(--text2);width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.3s;box-shadow:0 0 20px var(--glow1)}
.theme-btn:hover{transform:scale(1.1);box-shadow:0 0 30px var(--glow1)}
.wrap{position:relative;z-index:10;width:100%;max-width:440px}
.logo-row{text-align:center;margin-bottom:32px}
.logo-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 0 40px var(--glow1),0 0 80px var(--glow2)}
.logo-icon svg{width:28px;height:28px}
.logo-name{font-size:28px;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,var(--acc),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{color:var(--text3);font-size:13px;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:38px 34px;backdrop-filter:blur(24px);box-shadow:0 0 60px var(--glow1),0 0 120px var(--glow2),0 40px 80px rgba(0,0,0,0.3);transition:box-shadow 0.4s}
.card-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.03em;margin-bottom:4px}
.card-sub{color:var(--text3);font-size:13px;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:7px}
.field{margin-bottom:16px}
.input-wrap{position:relative}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);transition:color 0.2s;pointer-events:none;display:flex}
.inp{width:100%;padding:13px 14px 13px 44px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;transition:all 0.25s;font-family:inherit}
.inp:focus{background:var(--input-focus);border-color:var(--border2);box-shadow:0 0 20px var(--glow1)}
.inp.pass-inp{padding-right:44px}
.inp::placeholder{color:var(--text3)}
.eye-btn{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);display:flex;padding:0;transition:color 0.2s}
.eye-btn:hover{color:var(--acc)}
.error-box{background:var(--err-bg);border:1px solid var(--err-border);border-radius:10px;padding:10px 14px;color:var(--err-text);font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.25s;box-shadow:0 0 30px var(--glow1),0 8px 30px rgba(99,102,241,0.4);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 50px var(--glow1),0 12px 40px rgba(99,102,241,0.5)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.hint{margin-top:18px;padding:11px 14px;background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:10px}
.hint p{margin:0;font-size:11px;color:var(--text3)}.hint span{color:var(--acc);font-weight:700}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.wrap{animation:fadeIn 0.5s ease}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="stars" id="stars"></div>
<button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
<div class="wrap">
  <div class="logo-row">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div class="logo-name">IntelliResult</div>
    <div class="logo-sub">Academic Intelligence Platform</div>
  </div>
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access your academic records</div>
    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21c0-4.4 4-8 9-8s9 3.6 9 8"/></svg>
          </span>
          <input class="inp" id="username" type="text" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input class="inp pass-inp" id="password" type="password" placeholder="Enter password" required autocomplete="current-password">
          <button type="button" class="eye-btn" id="eyeBtn">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="error-box" id="errBox" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errText">Invalid credentials</span>
      </div>
      <button class="btn-primary" type="submit" id="submitBtn">Sign In &rarr;</button>
    </form>
    <div class="hint">
      <p><span>Demo:</span> student1 / 1234 &nbsp;&middot;&nbsp; admin / admin123</p>
    </div>
  </div>
</div>
<script>
const USERS = { student1: "1234", admin: "admin123" };
const theme = localStorage.getItem("ir-theme") || "dark";
document.documentElement.setAttribute("data-theme", theme);
const themeBtn = document.getElementById("themeBtn");
themeBtn.textContent = theme === "dark" ? "🌙" : "☀️";
themeBtn.onclick = () => {
  const t = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("ir-theme", t);
  themeBtn.textContent = t === "dark" ? "🌙" : "☀️";
};
let showPass = false;
document.getElementById("eyeBtn").onclick = () => {
  showPass = !showPass;
  const inp = document.getElementById("password");
  inp.type = showPass ? "text" : "password";
  document.getElementById("eyeIcon").innerHTML = showPass
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
};
document.getElementById("loginForm").onsubmit = function(e) {
  e.preventDefault();
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value;
  const btn = document.getElementById("submitBtn");
  const err = document.getElementById("errBox");
  err.style.display = "none";
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Authenticating...';
  setTimeout(() => {
    if (USERS[u] && USERS[u] === p) {
      sessionStorage.setItem("ir-user", u);
      sessionStorage.setItem("ir-theme", document.documentElement.getAttribute("data-theme"));
      window.location.href = "dashboard.html";
    } else {
      document.getElementById("errText").textContent = "Invalid username or password. Try student1 / 1234";
      err.style.display = "flex";
      btn.disabled = false;
      btn.innerHTML = "Sign In &rarr;";
    }
  }, 900);
};
const stars = document.getElementById("stars");
for (let i = 0; i < 60; i++) {
  const s = document.createElement("div");
  s.className = "star";
  const sz = Math.random() * 2.5 + 1;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*5}s;opacity:${Math.random()*0.5+0.1}`;
  stars.appendChild(s);
}
</script>
</body>
</html>
